<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Parking Pass Generator — Holiday Inn Express &amp; Suites Quakertown</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Lilita+One&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #f4f6f9;
      --surface:  #ffffff;
      --border:   #e2e6ed;
      --blue:     #1a4b8c;
      --blue2:    #2563b0;
      --gold:     #c89b2a;
      --gold2:    #e5b93a;
      --text:     #1a1f2e;
      --muted:    #6b7280;
      --green:    #dc2626;
      --font:     'Nunito', sans-serif;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px 60px;
    }

    /* HEADER */
    .header {
      text-align: center;
      margin-bottom: 36px;
    }
    .header-kicker {
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 8px;
    }
    .header h1 {
      font-family: var(--font);
      font-size: clamp(1.4rem, 4vw, 2rem);
      font-weight: 800;
      color: var(--blue);
      line-height: 1.2;
    }
    .header p {
      margin-top: 8px;
      font-size: 14px;
      color: var(--muted);
    }

    /* GENERATOR BOX */
    .generator {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.06);
      margin-bottom: 40px;
    }
    .generator label {
      display: block;
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 8px;
      letter-spacing: 0.04em;
    }
    .input-row {
      display: flex;
      gap: 10px;
    }
    .generator input {
      flex: 1;
      padding: 12px 16px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-family: var(--font);
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
      outline: none;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      transition: border-color 0.15s;
    }
    .generator input:focus { border-color: var(--blue2); }
    .generator input::placeholder { color: #c0c4cc; font-weight: 600; text-transform: none; letter-spacing: 0; }
    .generate-btn {
      padding: 12px 22px;
      background: var(--blue);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-family: var(--font);
      font-size: 14px;
      font-weight: 800;
      cursor: pointer;
      letter-spacing: 0.04em;
      transition: background 0.15s;
      white-space: nowrap;
    }
    .generate-btn:hover { background: var(--blue2); }

    /* PASSES LIST */
    .passes-wrap { display: none; width: 100%; max-width: 680px; }
    .passes-wrap.visible { display: block; }

    .passes-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
      flex-wrap: wrap;
      gap: 10px;
    }
    .passes-header h2 {
      font-size: 15px;
      font-weight: 800;
      color: var(--text);
    }
    .passes-header span {
      font-size: 13px;
      color: var(--muted);
      font-weight: 600;
    }

    .passes-grid {
      display: flex;
      flex-direction: column;
      gap: 28px;
    }

    /* PASS WRAPPER (card + print button) */
    .pass-wrapper {}
    .pass-print-row {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 10px;
    }
    .print-btn {
      padding: 9px 22px;
      background: var(--green);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-family: var(--font);
      font-size: 13px;
      font-weight: 800;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .print-btn:hover { opacity: 0.85; }

    /* SINGLE PASS */
    .pass {
      background: var(--surface);
      border: 2px solid var(--blue);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(26,75,140,0.1);
    }

    .pass-top {
      background: var(--blue);
      padding: 18px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }
    .pass-logo-text {
      color: #fff;
    }
    .pass-logo-text .hotel-name {
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      line-height: 1.3;
    }
    .pass-logo-text .hotel-sub {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.65);
      margin-top: 2px;
    }
    .pass-badge {
      background: var(--gold);
      color: #fff;
      font-size: 12px;
      font-weight: 900;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 7px 14px;
      border-radius: 6px;
      white-space: nowrap;
    }

    .pass-body {
      padding: 32px 32px 24px;
    }

    .pass-title {
      font-size: 32px;
      font-weight: 900;
      color: var(--blue);
      letter-spacing: 0.04em;
      text-transform: uppercase;
      text-align: center;
      border-bottom: 1.5px dashed var(--border);
      padding-bottom: 20px;
      margin-bottom: 24px;
    }

    .pass-fields {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px 24px;
    }
    .pass-field {}
    .pass-field .field-label {
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 4px;
    }
    .pass-field .field-val {
      font-size: 17px;
      font-weight: 800;
      color: var(--text);
      letter-spacing: 0.04em;
    }
    .pass-field.full { grid-column: span 2; }

    .conf-box {
      margin-top: 20px;
      background: var(--bg);
      border: 1.5px dashed var(--blue2);
      border-radius: 10px;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }
    .conf-box .conf-label {
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--blue);
    }
    .conf-box .conf-num {
      font-size: 26px;
      font-weight: 900;
      color: var(--blue);
      letter-spacing: 0.1em;
    }
    .conf-box .pass-num {
      font-size: 13px;
      font-weight: 700;
      color: var(--muted);
      white-space: nowrap;
    }

    .pass-footer {
      background: #f0f4fa;
      border-top: 1px solid var(--border);
      padding: 12px 24px;
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      text-align: center;
      letter-spacing: 0.04em;
    }

    /* PRINT — each pass triggers printing via its own hidden print sheet */
    @media print {
      @page {
        size: letter portrait;
        margin: 0.4in;
      }
      * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }

      body {
        background: #fff;
        padding: 0;
        margin: 0;
        display: block;
      }

      /* Hide everything by default */
      .header,
      .generator,
      .passes-header,
      .passes-wrap,
      .pass-wrapper,
      .pass-print-row {
        display: none !important;
      }

      /* Show only the targeted pass */
      .pass-wrapper.printing {
        display: block !important;
      }
      .pass-wrapper.printing .pass-print-row {
        display: none !important;
      }
      .pass-wrapper.printing .pass {
        border: 2px solid var(--blue);
        border-radius: 16px;
        overflow: hidden;
        box-shadow: none;
        width: 100%;
        /* Make it fill the page */
        min-height: calc(100vh - 0.8in);
        display: flex;
        flex-direction: column;
      }
      .pass-wrapper.printing .pass-body {
        flex: 1;
        padding: 48px 48px 36px;
      }
      .pass-wrapper.printing .pass-title {
        font-size: 48px;
        padding-bottom: 28px;
        margin-bottom: 32px;
      }
      .pass-wrapper.printing .pass-fields {
        gap: 28px 32px;
      }
      .pass-wrapper.printing .pass-field .field-label {
        font-size: 13px;
        margin-bottom: 6px;
      }
      .pass-wrapper.printing .pass-field .field-val {
        font-size: 28px;
      }
      .pass-wrapper.printing .conf-box {
        margin-top: 32px;
        padding: 20px 28px;
      }
      .pass-wrapper.printing .conf-box .conf-label {
        font-size: 13px;
      }
      .pass-wrapper.printing .conf-box .conf-num {
        font-size: 42px;
      }
      .pass-wrapper.printing .conf-box .pass-num {
        font-size: 17px;
      }
      .pass-wrapper.printing .pass-footer {
        padding: 18px 32px;
        font-size: 14px;
      }
      .pass-wrapper.printing .pass-top {
        padding: 24px 32px;
      }
      .pass-wrapper.printing .pass-logo-text .hotel-name {
        font-size: 18px;
      }
      .pass-wrapper.printing .pass-logo-text .hotel-sub {
        font-size: 14px;
      }
      .pass-wrapper.printing .pass-badge {
        font-size: 16px;
        padding: 10px 18px;
      }
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-kicker">Holiday Inn Express &amp; Suites Quakertown</div>
    <h1>Parking Pass</h1>
    <p>Enter a confirmation number to generate 2 parking passes.</p>
  </div>

  <div class="generator">
    <label for="confInput">Confirmation Number</label>
    <div class="input-row">
      <input type="text" id="confInput" placeholder="e.g. 83920471" maxlength="20" />
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px;">
      <div>
        <label for="checkIn" style="margin-bottom:6px;">Check-In Date</label>
        <input type="date" id="checkIn" style="width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:10px;font-family:var(--font);font-size:14px;font-weight:600;color:var(--text);outline:none;transition:border-color 0.15s;" onfocus="this.style.borderColor='var(--blue2)'" onblur="this.style.borderColor='var(--border)'" />
      </div>
      <div>
        <label for="checkOut" style="margin-bottom:6px;">Check-Out Date</label>
        <input type="date" id="checkOut" style="width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:10px;font-family:var(--font);font-size:14px;font-weight:600;color:var(--text);outline:none;transition:border-color 0.15s;" onfocus="this.style.borderColor='var(--blue2)'" onblur="this.style.borderColor='var(--border)'" />
      </div>
    </div>
    <button class="generate-btn" onclick="generatePasses()" style="width:100%;margin-top:12px;">Generate Passes</button>
  </div>

  <div class="passes-wrap" id="passesWrap">
    <div class="passes-header">
      <div>
        <h2>Parking Passes</h2>
        <span id="confDisplay"></span>
      </div>
    </div>
    <div class="passes-grid" id="passesGrid"></div>
  </div>

  <script>
    function formatDate(val) {
      if (!val) return 'Not specified';
      const [y,m,d] = val.split('-');
      const dt = new Date(y, m-1, d);
      return dt.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    }

    function printPass(passIndex) {
      const wrappers = document.querySelectorAll('.pass-wrapper');
      wrappers[passIndex].classList.add('printing');
      window.print();
      wrappers[passIndex].classList.remove('printing');
    }

    function generatePasses() {
      const raw = document.getElementById('confInput').value.trim().toUpperCase();
      if (!raw) { alert('Please enter a confirmation number.'); return; }

      const checkInVal  = document.getElementById('checkIn').value;
      const checkOutVal = document.getElementById('checkOut').value;
      if (!checkInVal)  { alert('Please select a check-in date.');  return; }
      if (!checkOutVal) { alert('Please select a check-out date.'); return; }

      const checkInStr  = formatDate(checkInVal);
      const checkOutStr = formatDate(checkOutVal);

      document.getElementById('confDisplay').textContent = 'Confirmation #' + raw + '  ·  ' + checkInStr + ' – ' + checkOutStr;

      const grid = document.getElementById('passesGrid');
      grid.innerHTML = '';

      for (let i = 1; i <= 2; i++) {
        const idx = i - 1;
        grid.innerHTML += `
          <div class="pass-wrapper" id="passWrapper${idx}">
            <div class="pass-print-row">
              <button class="print-btn" onclick="printPass(${idx})">Print Pass ${i}</button>
            </div>
            <div class="pass">
              <div class="pass-top">
                <div class="pass-logo-text">
                  <div class="hotel-name">Holiday Inn Express &amp; Suites</div>
                  <div class="hotel-sub">Quakertown, PA</div>
                </div>
                <div class="pass-badge">Parking Pass</div>
              </div>
              <div class="pass-body">
                <div class="pass-title">Parking Pass</div>
                <div class="pass-fields">
                  <div class="pass-field">
                    <div class="field-label">Check-In</div>
                    <div class="field-val">${checkInStr}</div>
                  </div>
                  <div class="pass-field">
                    <div class="field-label">Check-Out</div>
                    <div class="field-val">${checkOutStr}</div>
                  </div>
                  <div class="pass-field full">
                    <div class="field-label">Valid For</div>
                    <div class="field-val">Registered Hotel Guests Only</div>
                  </div>
                </div>
                <div class="conf-box">
                  <div>
                    <div class="conf-label">Confirmation Number</div>
                    <div class="conf-num">${raw}</div>
                  </div>
                  <div class="pass-num">Pass ${i} of 2</div>
                </div>
              </div>
              <div class="pass-footer">Please display this pass visibly on your dashboard. Valid during your registered stay only.</div>
            </div>
          </div>`;
      }

      document.getElementById('passesWrap').classList.add('visible');
      document.getElementById('passesWrap').scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    // Set default dates to today and tomorrow
    (function() {
      const today = new Date();
      const tomorrow = new Date(today);
      tomorrow.setDate(today.getDate() + 1);
      const fmt = d => d.toISOString().split('T')[0];
      document.getElementById('checkIn').value  = fmt(today);
      document.getElementById('checkOut').value = fmt(tomorrow);
    })();

    document.getElementById('checkIn').addEventListener('change', function() {
      const checkOut = document.getElementById('checkOut');
      const inDate = new Date(this.value + 'T00:00:00');
      const next = new Date(inDate);
      next.setDate(inDate.getDate() + 1);
      checkOut.value = next.toISOString().split('T')[0];
    });

    document.getElementById('confInput').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') generatePasses();
    });
  </script>
</body>
</html>
